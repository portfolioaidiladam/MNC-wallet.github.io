services:
  postgres:
    image: postgres:15-alpine
    container_name: mnc-wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mncwallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mncwallet}
      POSTGRES_DB: ${POSTGRES_DB:-mncwallet}
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mnc-wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: mnc-wallet-asynqmon
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: ["--redis-addr=redis:6379"]
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: